# ════════════════════════════════════════════════════════════════
# SpaceJam — Production Docker Compose
# Run: docker compose up -d --build
# ════════════════════════════════════════════════════════════════

services:
  spacejam-web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: spacejam-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - spacejam

networks:
  spacejam:
    driver: bridge

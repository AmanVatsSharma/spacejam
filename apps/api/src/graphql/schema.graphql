  # Revenue — Deposits
  deposits(filters: DepositFiltersInput): [Deposit!]!
  deposit(id: ID!): Deposit

  # Revenue — Contracts
  contracts(filters: ContractFiltersInput): [Contract!]!
  contract(id: ID!): Contract

  # Events
  events(filters: EventFiltersInput): [Event!]!
  event(id: ID!): Event
  todayEvents(centerId: String): [Event!]!
  upcomingEvents(centerId: String): [Event!]!
  pastEvents(centerId: String): [Event!]!
  eventStatistics(centerId: String): EventStatistics!
  eventsByDateRange(startDate: String!, endDate: String!, centerId: String): [Event!]!
  availableRoomsForEvent(centerId: String!, eventDate: String!, startTime: String!, endTime: String!, floorId: String): [MeetingRoom!]!

  # Meeting Rooms
  meetingRooms(filters: RoomFiltersInput): [MeetingRoom!]!
  meetingRoom(id: ID!): MeetingRoom
  availableRooms(centerId: String, capacity: Int): [MeetingRoom!]!
  roomAvailability(centerId: String!, floorId: String!, eventDate: String!, startTime: String!, endTime: String!): [MeetingRoom!]!

  # Requests
  requests(filters: RequestFiltersInput): [Request!]!
  request(id: ID!): Request
  requestStats(centerId: String): RequestStatistics!
  myRequests(requestedBy: String!, status: RequestStatus): [Request!]!
  pendingRequests(centerId: String, urgency: String): [Request!]!
  requestsByType(type: RequestType!, centerId: String): [Request!]!
  highPriorityRequests(centerId: String): [Request!]!
  overdueRequests(centerId: String): [Request!]!

  # Analytics
  dashboardMetrics(centerId: ID): DashboardMetrics!
  revenueReport(centerId: ID, period: TimePeriod): RevenueReport!
  occupancyReport(centerId: ID, period: TimePeriod): OccupancyReport!
}


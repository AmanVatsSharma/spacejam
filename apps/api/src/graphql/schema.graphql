  # Floors & Seats
  floors(centerId: ID): [Floor!]!
  seats(floorId: ID): [Seat!]!
  seat(id: ID!): Seat

  # Bookings
  bookings(filters: BookingFilters): [Booking!]!
  myBookings: [Booking!]!
  booking(id: ID!): Booking

  # CRM — Leads
  leads(filters: LeadFiltersInput): [Lead!]!
  lead(id: ID!): Lead
  leadCount(status: LeadStatus): Int!

  # CRM — Customers
  customers(filters: CustomerFiltersInput): [Customer!]!
  customer(id: ID!): Customer
  customerCount(status: CustomerStatus): Int!

  # Revenue — Invoices
  invoices(filters: InvoiceFiltersInput): [Invoice!]!
  invoice(id: ID!): Invoice
